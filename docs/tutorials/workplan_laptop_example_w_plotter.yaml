# yaml-language-server: $schema=https://c-star.readthedocs.io/en/latest/_downloads/d93c79fe7f8f58b0fa61da8ff8d25e87/workplan_schema.1.0.0.json
name: example_workplan
description: Runs a Wales model, then make some plots!
state: draft
runtime_vars:
  - time_slice

steps:
  - name: wales
    application: roms_marbl
    blueprint: ./wales_toy_blueprint.yaml
    
  - name: wales_plotter
    application: plotter
    blueprint: ./wales_toy_plotter_blueprint.yaml
    depends_on:
      - wales
    blueprint_overrides:
      working_dir: "{{work_dir: wales_plotter}}/output"
      input_dir: "{{work_dir: wales}}/joined_output"
      grid_file_path: "{{work_dir: wales}}/input/input_datasets/roms_grd.nc"
      time_indices:
        - "{{time_slice}}"

# yaml-language-server: $schema=https://c-star.readthedocs.io/en/latest/_downloads/d93c79fe7f8f58b0fa61da8ff8d25e87/workplan_schema.1.0.0.json
name: example_workplan
description: Runs a Wales model, then a WIO model, all on your laptop!
state: draft

steps:
  - name: wales
    application: roms_marbl
    blueprint: ./wales_toy_blueprint.yaml
    
  - name: wio
    application: roms_marbl
    blueprint: ./wio_toy_blueprint.yaml
    depends_on:
      - wales



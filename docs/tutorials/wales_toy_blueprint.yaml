# yaml-language-server: $schema=https://raw.githubusercontent.com/CWorthy-ocean/C-Star/refs/heads/main/docs/schemas/bp/roms_marbl/roms_marbl_schema.1.0.0.json
name: roms_marbl_example_wales_new_bp
description: toy domain near wales, for fast laptop/CI runs
state: draft
working_dir: ~/cstar/wales_toy_blueprint
valid_start_date: 2012-01-01 00:00:00
valid_end_date: 2012-01-31 12:00:00
code:
  pio:
    location: https://github.com/NCAR/ParallelIO.git
    branch: pio2_7_0
  roms:
    documentation: cworthy fork
    location: https://github.com/CWorthy-ocean/ucla-roms.git
    commit: a8032136b386b8336007aec50e454208f35ba5dc
  run_time:
    location: https://github.com/CWorthy-ocean/cstar_blueprint_roms_marbl_example.git
    branch: main
    filter:
      directory: wales-toy-domain-namelist
      files:
      - marbl_in
      - namelist.nml
  compile_time:
    location: https://github.com/CWorthy-ocean/cstar_blueprint_roms_marbl_example.git
    branch: pio
    filter:
      directory: wales-toy-domain-namelist
      files:
      - cppdefs.opt
  marbl:
    location: https://github.com/marbl-ecosys/MARBL.git
    branch: marbl0.45.0
initial_conditions:
  data:
  - location: https://github.com/CWorthy-ocean/cstar_blueprint_roms_marbl_example/raw/refs/heads/pio/wales-toy-domain/input_datasets_netcdf/roms_ini.nc
grid:
  documentation: my favorite grid
  data:
  - location: https://github.com/CWorthy-ocean/cstar_blueprint_roms_marbl_example/raw/refs/heads/pio/wales-toy-domain/input_datasets_netcdf/roms_grd.nc
forcing:
  boundary:
    data:
    - location: https://github.com/CWorthy-ocean/cstar_blueprint_roms_marbl_example/raw/refs/heads/pio/wales-toy-domain/input_datasets_netcdf/roms_bry.nc
    - location: https://github.com/CWorthy-ocean/cstar_blueprint_roms_marbl_example/raw/refs/heads/pio/wales-toy-domain/input_datasets_netcdf/roms_bry_bgc.nc
  surface:
    documentation: best forcing ever
    locked: true
    data:
    - location: https://github.com/CWorthy-ocean/cstar_blueprint_roms_marbl_example/raw/refs/heads/pio/wales-toy-domain/input_datasets_netcdf/roms_frc.nc
    - location: https://github.com/CWorthy-ocean/cstar_blueprint_roms_marbl_example/raw/refs/heads/pio/wales-toy-domain/input_datasets_netcdf/roms_frc_bgc.nc
  tidal:
    data:
    - location: https://github.com/CWorthy-ocean/cstar_blueprint_roms_marbl_example/raw/refs/heads/pio/wales-toy-domain/input_datasets_netcdf/roms_tides.nc
partitioning:
  n_procs_x: 3
  n_procs_y: 3
model_params:
  time_step: 360
  use_pio: true
runtime_params:
  start_date: 2012-01-01 00:00:00
  end_date: 2012-01-01 00:30:00
cdr_forcing:
  data:
  - location: https://github.com/CWorthy-ocean/cstar_blueprint_roms_marbl_example/raw/refs/heads/pio/wales-toy-domain/input_datasets_netcdf/my_cdr_forcing.nc
application: roms_marbl

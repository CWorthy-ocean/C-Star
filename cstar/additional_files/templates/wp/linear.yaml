# yaml-language-server: $schema=https://raw.githubusercontent.com/CWorthy-ocean/C-Star/refs/heads/main/docs/schemas/wp/workplan_schema.1.0.0.json
name: Linear Workplan
description: A workplan that usees dependencies to ensure that all tasks execute in a series.
steps:
- name: Step L1
  application: sleep
  blueprint: ~/code/cstar/cstar/additional_files/templates/blueprint.yaml
  depends_on:
  - Step L2
- name: Step L2
  application: sleep
  blueprint: ~/code/cstar/cstar/additional_files/templates/blueprint.yaml
  depends_on:
  - Step L3
- name: Step L3
  application: sleep
  blueprint: ~/code/cstar/cstar/additional_files/templates/blueprint.yaml
  depends_on:
  - Step L4
- name: Step L4
  application: sleep
  blueprint: ~/code/cstar/cstar/additional_files/templates/blueprint.yaml
state: draft
